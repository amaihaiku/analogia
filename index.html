<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#141210"/>
<title>Analogia</title>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css?v=14"/>
</head>
<body>

<div id="rotate-overlay" class="rotate-overlay hidden">
  <div class="rotate-content">
    <div class="rotate-icon">⟳</div>
    <p class="rotate-title">Forgasd vissza álló módba</p>
    <small>Az Analogia álló tájoláshoz készült</small>
  </div>
</div>

<div id="photo-overlay" class="photo-overlay hidden">
  <div class="photo-overlay-bg" id="photo-overlay-bg"></div>
  <div class="photo-overlay-content">
    <div class="photo-overlay-hint">
      <span>📥 Tartsd lenyomva a képet a mentéshez</span>
    </div>
    <img id="photo-preview-img" class="photo-preview-img" alt="Fotó előnézet"/>
    <div class="photo-overlay-actions">
      <button class="photo-overlay-save" id="photo-save-btn">⬇ MENTÉS / LETÖLTÉS</button>
      <button class="photo-overlay-close" id="photo-overlay-close">BEZÁRÁS</button>
    </div>
  </div>
</div>

<div id="saving-overlay" class="saving-overlay hidden">
  <div class="saving-box">
    <div class="saving-spinner"></div>
    <p>Fénykép mentése…</p>
  </div>
</div>

<div id="film-modal" class="modal hidden">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">FILM SZIMULÁCIÓ</span>
      <button class="modal-close" id="modal-close"></button>
    </div>
    <div class="modal-list" id="film-list"></div>
    <div class="modal-sep"></div>
    <label class="modal-upload-btn">
      <span>+ SAJÁT LUT (.cube)</span>
      <input type="file" id="lut-upload" accept=".cube"/>
    </label>
  </div>
</div>

<div class="shell">

  <header class="topbar">
    <div class="brand-wrap">
      <span class="brand">Analogia</span>
      <span class="model">RF-1</span>
    </div>
    <button class="film-btn" id="film-btn">
      <span class="film-btn-label" id="film-label">KODACHROME 64</span>
      <span class="film-btn-arrow">▾</span>
    </button>
    <div class="hud-right">
      <button class="exit-btn" id="exit-btn" title="Kilépés"></button>
    </div>
  </header>

  <div class="vf-wrap">
    <div class="vf-bezel">
      <div class="bc tl"></div><div class="bc tr"></div>
      <div class="bc bl"></div><div class="bc br"></div>
      <canvas id="gl-canvas"></canvas>
      <div class="focus-overlay" id="focus-overlay"></div>
      <div class="focus-ring hidden" id="focus-ring"></div>
      <div class="vf-hud">
        <div class="hud-row"><span class="hud-val" id="hud-mode-val">±0.0 EV</span><span class="hud-dim" id="hud-focus-label">AF</span></div>
        <div class="hud-row"><span class="hud-dim" id="hud-res">—</span><span class="hud-dim" id="hud-mode-name">EXPOSURE</span></div>
      </div>
      <div class="noperm" id="noperm">
        <div class="noperm-icon">⊘</div>
        <p>NINCS KAMERA</p>
        <small>Engedélyezd a kamerát</small>
        <button class="perm-btn" id="perm-btn">ENGEDÉLYEZÉS</button>
        <small id="perm-err"></small>
      </div>
    </div>
  </div>

  <div class="ctrl-bottom">

    <div class="mode-bar">
      <button class="mode-btn active" data-mode="exposure"><span class="led"></span>EV</button>
      <button class="mode-btn" data-mode="shadows"><span class="led"></span>SHDW</button>
      <button class="mode-btn" data-mode="highlights"><span class="led"></span>HIGH</button>
      <button class="mode-btn" data-mode="tone"><span class="led"></span>TONE</button>
      <button class="mode-btn" data-mode="grain"><span class="led"></span>GRAIN</button>
      <button class="mode-btn" data-mode="vignette"><span class="led"></span>VIGN</button>
    </div>

    <div class="dial-h" id="dial-wrap">
      <div class="dial-track-h"><div class="dial-ticks-h" id="dial-ticks"></div></div>
      <div class="dial-center-h"></div>
    </div>

    <div class="aux-row">
      <div class="toggle-group">
        <label class="tog-wrap">
          <input type="checkbox" id="date-tog"/>
          <div class="tog-track"><div class="tog-thumb"></div></div>
        </label>
        <span class="tog-lbl">DÁTUM</span>
      </div>
      
      <div class="frame-radio-container">
        <div class="frame-radio-group">
          <label class="fr-lbl"><input type="radio" name="frame-opt" value="none" checked/><span>KI</span></label>
          <label class="fr-lbl"><input type="radio" name="frame-opt" value="antik"/><span>ANTIK</span></label>
          <label class="fr-lbl"><input type="radio" name="frame-opt" value="polaroid"/><span>POLA</span></label>
          <label class="fr-lbl"><input type="radio" name="frame-opt" value="film"/><span>FILM</span></label>
        </div>
        <span class="tog-lbl">KERET</span>
      </div>
    </div>

    <div class="shutter-row">
      <button class="de-toggle-btn" id="de-toggle-btn" title="Dupla Expozíció">
        <span class="de-led" id="de-led"></span>
        <span class="de-text">DE</span>
      </button>
      
      <button class="shutter" id="shutter">
        <span class="sh-ring"></span>
        <span class="sh-core"></span>
      </button>

      <button class="cam-toggle-btn" id="cam-toggle-btn" title="Kamera váltása">
        <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"/></svg>
      </button>
    </div>

  </div>
</div>

<video id="vid" playsinline autoplay muted style="display:none"></video>
<canvas id="save-canvas" style="display:none"></canvas>
<script src="app.js?v=14"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      for (let registration of registrations) {
        registration.unregister().then(() => {
          console.log('[SW] Régi gyorsítótár-börtön sikeresen felszámolva!');
        });
      }
    });
  }
</script>
</body>
</html>
