<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#000"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c8a84b" stroke-width="12"/>
  <!-- Aperture blades: 6 blades, each a rotated leaf shape -->
  <g fill="#c8a84b" opacity="0.92">
    <!-- blade 1 -->
    <path d="M256 256 L210 80 Q256 50 302 80 Z" transform="rotate(0 256 256)"/>
    <path d="M256 256 L210 80 Q256 50 302 80 Z" transform="rotate(60 256 256)"/>
    <path d="M256 256 L210 80 Q256 50 302 80 Z" transform="rotate(120 256 256)"/>
    <path d="M256 256 L210 80 Q256 50 302 80 Z" transform="rotate(180 256 256)"/>
    <path d="M256 256 L210 80 Q256 50 302 80 Z" transform="rotate(240 256 256)"/>
    <path d="M256 256 L210 80 Q256 50 302 80 Z" transform="rotate(300 256 256)"/>
  </g>
  <!-- Center hole -->
  <circle cx="256" cy="256" r="52" fill="#000"/>
  <!-- Inner ring detail -->
  <circle cx="256" cy="256" r="52" fill="none" stroke="#c8a84b" stroke-width="6" opacity="0.6"/>
</svg>
